name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── API ─────────────────────────────────────────────────────────────
      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Run API tests
        working-directory: ./api
        run: npm test -- --no-coverage

      - name: Build API (TypeScript → dist/)
        working-directory: ./api
        run: npm run build

      # ── Deploy frontend naar Azure Static Web Apps ──────────────────────
      - name: Deploy frontend naar SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'        # Vite build
          output_location: 'dist'  # Vite output

      # ── Deploy API naar standalone Azure Functions ───────────────────────
      - name: Login naar Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Maak deployment zip van API
        run: |
          cd api
          zip -r ../api-deploy.zip . \
            --exclude "*.ts" \
            --exclude "__tests__/*" \
            --exclude ".gitignore" \
            --exclude "tsconfig*.json" \
            --exclude "*.test.js" \
            --exclude ".env*"
          echo "Zip grootte: $(du -sh ../api-deploy.zip | cut -f1)"

      - name: Deploy API naar Azure Functions
        run: |
          az functionapp deploy \
            --resource-group rg-musici-belasting-app \
            --name func-musici-belasting \
            --src-path api-deploy.zip \
            --type zip

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
