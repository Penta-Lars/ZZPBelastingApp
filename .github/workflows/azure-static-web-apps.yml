name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── API ─────────────────────────────────────────────────────────────
      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Run API tests
        working-directory: ./api
        run: npm test -- --no-coverage

      - name: Build API (TypeScript → dist/)
        working-directory: ./api
        run: npm run build

      # ── Deploy frontend naar Azure Static Web Apps ──────────────────────
      - name: Deploy frontend naar SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'        # Vite build
          output_location: 'dist'  # Vite output
          skip_api_build: 'true'   # API staat in eigen Function App

      # ── Deploy API naar standalone Azure Functions ───────────────────────
      - name: Deploy API naar Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-musici-belasting'
          package: './api'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
