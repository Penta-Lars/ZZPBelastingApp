name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run API tests
        working-directory: ./api
        run: |
          npm ci
          npm test -- --no-coverage

      - name: Build API (TypeScript → dist/)
        working-directory: ./api
        run: npm run build

      - name: Prepare API voor deployment (verwijder TypeScript-specific files)
        run: |
          # Verwijder TypeScript bronbestanden zodat oryx de API als Node.js detecteert
          rm -f api/tsconfig.json
          rm -rf api/src/
          rm -rf api/__tests__/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'              # root → Vite build
          api_location: 'api-minimal'    # TIJDELIJK: minimale test-API
          output_location: 'dist'        # Vite output directory
          api_build_command: 'echo "Minimal API, no build needed"'

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
